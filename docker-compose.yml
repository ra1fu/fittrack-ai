services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: fittrack-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://127.0.0.1:8000/api/v1}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5173').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: fittrack-backend
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-change-me-fittrack-ai-local-secret-key-32-plus-chars}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      DJANGO_CORS_ALLOW_CREDENTIALS: ${DJANGO_CORS_ALLOW_CREDENTIALS:-false}
      DATABASE_URL: postgres://${POSTGRES_USER:-fittrack}:${POSTGRES_PASSWORD:-fittrack_password}@db:5432/${POSTGRES_DB:-fittrack}
      NUTRITION_AI_PHOTO_PROVIDER: ${NUTRITION_AI_PHOTO_PROVIDER:-disabled}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      NUTRITION_AI_PHOTO_HTTP_TIMEOUT_SECONDS: ${NUTRITION_AI_PHOTO_HTTP_TIMEOUT_SECONDS:-60}
      OPEN_FOOD_FACTS_USER_AGENT: ${OPEN_FOOD_FACTS_USER_AGENT:-FitTrackAI/0.1 (contact@example.com)}
      DATABASE_WAIT_TIMEOUT_SECONDS: ${DATABASE_WAIT_TIMEOUT_SECONDS:-60}
      DJANGO_RUN_MIGRATIONS: ${DJANGO_RUN_MIGRATIONS:-false}
      DJANGO_SEED_CATALOGS: ${DJANGO_SEED_CATALOGS:-false}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    image: postgres:17-alpine
    container_name: fittrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fittrack}
      POSTGRES_USER: ${POSTGRES_USER:-fittrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fittrack_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-fittrack} -d ${POSTGRES_DB:-fittrack}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  backend_media:
